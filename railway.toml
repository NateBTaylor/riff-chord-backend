[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["*.py", "requirements.txt", "Dockerfile", "blueprints/**", "services/**", "models/**", "utils/**", "compat/**", "config/**"]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
